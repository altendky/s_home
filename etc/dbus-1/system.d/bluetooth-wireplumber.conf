<!-- Allow WirePlumber to communicate with bluetoothd -->
<!-- Fix for D-Bus rejection: WirePlumber sends unrequested method_return to bluetoothd -->
<!-- This is likely a bug in BlueZ 5.85 / WirePlumber 0.5.13 interaction -->
<!-- See: Ubuntu 26.04 + BlueZ 5.85 + WirePlumber 0.5.13 -->
<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- Allow unrequested replies to be sent -->
  <policy context="default">
    <allow send_requested_reply="false" send_type="method_return"/>
    <allow send_requested_reply="false" send_type="error"/>
    <allow receive_requested_reply="false" receive_type="method_return"/>
    <allow receive_requested_reply="false" receive_type="error"/>
  </policy>

  <!-- Explicitly allow root/bluetoothd to receive unrequested replies -->
  <policy user="root">
    <allow receive_requested_reply="false" receive_type="method_return"/>
    <allow receive_requested_reply="false" receive_type="error"/>
  </policy>
</busconfig>
