# Disable HFP/HSP headset profile auto-switching.
# The BTR5 is used as A2DP headphones only (no microphone).
wireplumber.settings = {
  bluetooth.autoswitch-to-headset-profile = false
}

# Completely disable HFP/HSP profile registration to prevent
# BlueZ cascade failure (HFP timeout kills A2DP - BlueZ #1992)
monitor.bluez.properties = {
  bluez5.roles = [ a2dp_sink a2dp_source bap_sink bap_source ]
}

# Disable node suspension to prevent bluetooth audio dropouts
monitor.bluez.rules = [
  {
    matches = [
      { node.name = "~bluez_output.*" }
      { node.name = "~bluez_input.*" }
    ]
    actions = {
      update-props = {
        session.suspend-timeout-seconds = 0
      }
    }
  }
]
